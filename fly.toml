# fly.toml app configuration file generated for brayat on 2026-03-28T11:45:36Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'brayat'
primary_region = 'ams'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256

[[mounts]]
  source = "brayat_data"
  destination = "/data"

[env]
  PORT = "8080"
  DATABASE_PATH = "/data/brayat.db"
  PHOTOS_DIR = "/data/photos"
  LOG_LEVEL = "info"
  GIN_MODE = "release"